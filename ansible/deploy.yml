---
- name: Desplegar 1p-express manager
  hosts: app_servers
  become: true
  vars:
    app_root: /opt/1p-express
    install_docker: false
    docker_packages:
      - docker.io
      - docker-compose-v2

  tasks:
    - name: Validar si Docker daemon está disponible
      ansible.builtin.command:
        cmd: docker info
      register: docker_info_before
      changed_when: false
      failed_when: false

    - name: Instalar dependencias Docker solo cuando se solicita
      block:
        - name: Remover paquete conflictivo containerd.io si existe
          ansible.builtin.apt:
            name: containerd.io
            state: absent
            purge: true

        - name: Instalar paquetes Docker Engine
          ansible.builtin.apt:
            name: "{{ docker_packages }}"
            state: present
            update_cache: true
      when:
        - install_docker | bool
        - docker_info_before.rc != 0

    - name: Iniciar servicio Docker cuando se instala con apt
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      when:
        - install_docker | bool
        - docker_info_before.rc != 0

    - name: Revalidar daemon Docker después de la preparación
      ansible.builtin.command:
        cmd: docker info
      register: docker_info_after
      changed_when: false
      failed_when: false

    - name: Falla explícita si Docker no está disponible
      ansible.builtin.fail:
        msg: >-
          Docker daemon no está disponible en el servidor remoto.
          Inicia Docker Desktop con integración WSL o ejecuta el playbook
          con -e install_docker=true en un host Linux sin Docker Desktop.
      when: docker_info_after.rc != 0

    - name: Crear directorio de aplicación
      ansible.builtin.file:
        path: "{{ app_root }}"
        state: directory
        mode: "0755"

    - name: Copiar proyecto al servidor
      ansible.builtin.copy:
        src: "../"
        dest: "{{ app_root }}"
        mode: "0755"

    - name: Construir imágenes Docker en servidor remoto
      ansible.builtin.command:
        cmd: docker build -t 1p-express-app:latest "{{ app_root }}"
      changed_when: true

    - name: Construir imagen manager en servidor remoto
      ansible.builtin.command:
        cmd: docker build -t 1p-express-manager:latest --build-arg APP_MODE=manager "{{ app_root }}"
      changed_when: true

    - name: Renderizar docker-compose del manager
      ansible.builtin.template:
        src: templates/docker-compose.manager.yml.j2
        dest: "{{ app_root }}/docker-compose.manager.yml"
        mode: "0644"

    - name: Levantar manager
      ansible.builtin.command:
        cmd: docker compose -f "{{ app_root }}/docker-compose.manager.yml" up -d
      changed_when: true
